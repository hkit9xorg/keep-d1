<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Keep D1</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f7fb;
      --panel: #ffffff;
      --panel-soft: #f8fafc;
      --text: #172033;
      --muted: #657287;
      --line: #dce3ee;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --accent: #b4b4b4;
      --danger: #dc2626;
      --danger-bg: #fef2f2;
      --shadow: 0 18px 50px rgba(23, 32, 51, 0.12);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    [hidden] {
      display: none !important;
    }

    body {
      min-height: 100vh;
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        linear-gradient(135deg, rgba(37, 99, 235, 0.10), transparent 28%),
        linear-gradient(315deg, rgba(245, 158, 11, 0.16), transparent 30%),
        var(--bg);
    }

    .app {
      width: min(980px, calc(100% - 32px));
      margin: 0 auto;
      padding: 36px 0 48px;
    }

    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 22px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.4rem, 7vw, 4.8rem);
      line-height: 0.95;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 1.08rem;
    }

    .header-tools {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      flex-wrap: wrap;
      max-width: 520px;
    }

    .code-pill,
    .count {
      min-height: 40px;
      padding: 10px 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.78);
      color: var(--muted);
      font-weight: 700;
      box-shadow: 0 8px 24px rgba(23, 32, 51, 0.06);
    }

    .code-pill {
      max-width: 280px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .code-pill strong {
      color: var(--text);
    }

    .composer {
      display: grid;
      gap: 14px;
      margin-bottom: 24px;
      padding: 16px;
      border: 1px solid rgba(220, 227, 238, 0.9);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.84);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    textarea,
    .code-input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel-soft);
      color: var(--text);
      font: inherit;
      outline: none;
      transition: border-color 160ms ease, box-shadow 160ms ease, background 160ms ease;
    }

    textarea {
      min-height: 58px;
      max-height: 260px;
      resize: none;
      overflow-y: hidden;
      padding: 14px 15px;
      line-height: 1.5;
    }

    .code-input {
      height: 48px;
      padding: 0 14px;
      font-weight: 700;
    }

    textarea:focus,
    .code-input:focus {
      border-color: var(--primary);
      background: #ffffff;
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.14);
    }

    textarea::placeholder,
    .code-input::placeholder {
      color: #8a97aa;
    }

    .composer-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
    }

    button {
      min-height: 40px;
      border: 0;
      border-radius: var(--radius);
      padding: 0 14px;
      cursor: pointer;
      font: inherit;
      font-weight: 700;
      transition: transform 140ms ease, box-shadow 140ms ease, background 140ms ease, color 140ms ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:focus-visible {
      outline: 3px solid rgba(37, 99, 235, 0.32);
      outline-offset: 2px;
    }

    .primary-button {
      background: var(--primary);
      color: #ffffff;
      box-shadow: 0 10px 24px rgba(37, 99, 235, 0.24);
    }

    .primary-button:hover {
      background: var(--primary-dark);
    }

    .ghost-button {
      border: 1px solid var(--line);
      background: #ffffff;
      color: var(--text);
    }

    .ghost-button:hover {
      background: #f8fafc;
      box-shadow: 0 8px 18px rgba(23, 32, 51, 0.08);
    }

    .danger-button {
      border: 1px solid #fecaca;
      background: var(--danger-bg);
      color: var(--danger);
    }

    .danger-button:hover {
      background: #fee2e2;
    }

    .notes {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 14px;
      align-items: start;
    }

    .note-card {
      display: grid;
      gap: 16px;
      min-height: 150px;
      padding: 16px;
      border: 1px solid rgba(220, 227, 238, 0.9);
      border-top: 5px solid var(--accent);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: 0 12px 30px rgba(23, 32, 51, 0.09);
    }

    .note-text {
      margin: 0;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      line-height: 1.55;
      font-size: 1rem;
    }

    .note-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      align-self: end;
      padding-top: 12px;
      border-top: 1px solid var(--line);
    }

    .note-date {
      color: var(--muted);
      font-size: 0.86rem;
      font-weight: 650;
    }

    .note-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .empty,
    .error {
      grid-column: 1 / -1;
      padding: 28px 18px;
      border: 1px dashed #b8c4d6;
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.7);
      color: var(--muted);
      text-align: center;
    }

    .error {
      border-color: #fecaca;
      background: #fff5f5;
      color: #991b1b;
    }

    .code-gate {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: grid;
      place-items: center;
      padding: 20px;
      background: rgba(244, 247, 251, 0.78);
      backdrop-filter: blur(14px);
    }

    .code-card {
      width: min(420px, 100%);
      display: grid;
      gap: 14px;
      padding: 20px;
      border: 1px solid rgba(220, 227, 238, 0.95);
      border-radius: var(--radius);
      background: #ffffff;
      box-shadow: var(--shadow);
    }

    .code-card h2 {
      margin: 0;
      font-size: 1.45rem;
      letter-spacing: 0;
    }

    .code-card-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    @media (max-width: 640px) {
      .app {
        width: min(100% - 20px, 980px);
        padding-top: 22px;
      }

      header {
        align-items: flex-start;
        flex-direction: column;
      }

      .header-tools,
      .code-pill,
      .count,
      .composer-actions,
      .note-footer,
      .primary-button {
        width: 100%;
      }

      .header-tools,
      .composer-actions,
      .note-footer {
        align-items: stretch;
        flex-direction: column;
      }

      .composer {
        padding: 12px;
      }

      .note-actions {
        width: 100%;
      }

      .note-actions button {
        flex: 1;
      }
    }
  </style>
</head>
<body>
  <div class="code-gate" id="codeGate" hidden>
    <form class="code-card" id="codeForm">
      <h2>Nhập code</h2>
      <input class="code-input" id="codeInput" autocomplete="off" spellcheck="false" placeholder="vd: ca-nhan" />
      <div class="code-card-actions">
        <button class="primary-button" type="submit">Mở ghi chú</button>
      </div>
    </form>
  </div>

  <main class="app" id="app" hidden>
    <header>
      <div>
        <h1 class="subtitle">Ghi lại nhanh mọi ý tưởng cần nhớ.</h1>
      </div>
      <div class="header-tools">
        <div class="code-pill" title="Code hiện tại">Code: <strong id="currentCode"></strong></div>
        <button class="ghost-button" id="changeCodeButton" type="button">Đổi code</button>
        <button class="ghost-button" id="copyLinkButton" type="button">Copy link</button>
        <div class="count" id="count">0 ghi chú</div>
      </div>
    </header>

    <form class="composer" id="form">
      <textarea id="title" rows="1" placeholder="Nhập nội dung ghi chú..."></textarea>
      <div class="composer-actions">
        <button class="primary-button" type="submit">Lưu ghi chú</button>
      </div>
    </form>

    <section class="notes" id="list" aria-live="polite"></section>
  </main>

  <script>
    const CODE_COOKIE = "keep_d1_code";
    const app = document.querySelector("#app");
    const form = document.querySelector("#form");
    const titleInput = document.querySelector("#title");
    const list = document.querySelector("#list");
    const count = document.querySelector("#count");
    const codeGate = document.querySelector("#codeGate");
    const codeForm = document.querySelector("#codeForm");
    const codeInput = document.querySelector("#codeInput");
    const currentCode = document.querySelector("#currentCode");
    const changeCodeButton = document.querySelector("#changeCodeButton");
    const copyLinkButton = document.querySelector("#copyLinkButton");
    const dateFormatter = new Intl.DateTimeFormat("vi-VN", {
      day: "2-digit",
      month: "2-digit",
      year: "numeric",
      hour: "2-digit",
      minute: "2-digit"
    });
    let activeCode = "";

    function normalizeCode(value) {
      return String(value ?? "").trim();
    }

    function resizeTextarea(textarea) {
      textarea.style.height = "auto";
      textarea.style.height = `${textarea.scrollHeight}px`;
      textarea.style.overflowY = textarea.scrollHeight >= 260 ? "auto" : "hidden";
    }

    function formatDate(value) {
      if (!value) return "";

      const date = new Date(String(value).replace(" ", "T"));
      return Number.isNaN(date.getTime()) ? "" : dateFormatter.format(date);
    }

    function getCookie(name) {
      const prefix = `${name}=`;
      const row = document.cookie
        .split(";")
        .map((item) => item.trim())
        .find((item) => item.startsWith(prefix));

      if (!row) return "";

      try {
        return decodeURIComponent(row.slice(prefix.length));
      } catch (error) {
        return "";
      }
    }

    function saveCodeCookie(code) {
      document.cookie = `${CODE_COOKIE}=${encodeURIComponent(code)}; Max-Age=31536000; Path=/; SameSite=Lax`;
    }

    function getUrlCode() {
      const url = new URL(window.location.href);
      return normalizeCode(url.searchParams.get("code"));
    }

    function syncUrlCode(code, mode = "replaceState") {
      const url = new URL(window.location.href);
      url.searchParams.set("code", code);
      window.history[mode]({}, "", url);
    }

    function notesUrl(path = "") {
      const url = new URL(`/api/keeps${path}`, window.location.origin);
      url.searchParams.set("code", activeCode);
      return url;
    }

    function updateCount(total) {
      count.textContent = `${total} ghi chú`;
    }

    function renderEmpty(message, className = "empty") {
      list.replaceChildren();

      const empty = document.createElement("div");
      empty.className = className;
      empty.textContent = message;
      list.append(empty);
    }

    function showCodeGate() {
      codeInput.value = activeCode;
      codeGate.hidden = false;
      if (!activeCode) app.hidden = true;

      requestAnimationFrame(() => {
        codeInput.focus();
        codeInput.select();
      });
    }

    function hideCodeGate() {
      codeGate.hidden = true;
      app.hidden = false;
    }

    function setActiveCode(code, options = {}) {
      const nextCode = normalizeCode(code);

      if (!nextCode) {
        activeCode = "";
        showCodeGate();
        return;
      }

      const changed = nextCode !== activeCode;
      activeCode = nextCode;
      currentCode.textContent = activeCode;
      currentCode.parentElement.title = `Code hiện tại: ${activeCode}`;
      saveCodeCookie(activeCode);

      if (options.writeUrl !== false) {
        syncUrlCode(activeCode, options.pushUrl && changed ? "pushState" : "replaceState");
      }

      hideCodeGate();
      loadKeeps();
    }

    async function loadKeeps() {
      if (!activeCode) {
        showCodeGate();
        return;
      }

      try {
        const res = await fetch(notesUrl());
        if (!res.ok) throw new Error("Không tải được dữ liệu");

        const keeps = await res.json();
        updateCount(keeps.length);
        list.replaceChildren();

        if (!keeps.length) {
          renderEmpty("Chưa có ghi chú nào cho code này.");
          return;
        }

        keeps.forEach(renderNote);
      } catch (error) {
        updateCount(0);
        renderEmpty("Không thể tải ghi chú. Vui lòng thử lại.", "error");
      }
    }

    function renderNote(keep) {
      const card = document.createElement("article");
      card.className = "note-card";

      const text = document.createElement("p");
      text.className = "note-text";
      text.textContent = keep.title;

      const footer = document.createElement("footer");
      footer.className = "note-footer";

      const date = document.createElement("span");
      date.className = "note-date";
      date.textContent = formatDate(keep.created_at);

      const actions = document.createElement("div");
      actions.className = "note-actions";

      const copyButton = document.createElement("button");
      copyButton.className = "ghost-button";
      copyButton.type = "button";
      copyButton.textContent = "Copy";
      copyButton.addEventListener("click", () => copyText(keep.title, copyButton, "Đã copy"));

      const deleteButton = document.createElement("button");
      deleteButton.className = "danger-button";
      deleteButton.type = "button";
      deleteButton.textContent = "Xóa";
      deleteButton.addEventListener("click", () => deleteKeep(keep.id));

      actions.append(copyButton, deleteButton);
      footer.append(date, actions);
      card.append(text, footer);
      list.append(card);
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();

      if (!activeCode) {
        showCodeGate();
        return;
      }

      const title = titleInput.value.trim();
      if (!title) {
        titleInput.focus();
        return;
      }

      const res = await fetch(notesUrl(), {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ title, code: activeCode })
      });

      if (!res.ok) {
        renderEmpty("Không thể lưu ghi chú. Vui lòng thử lại.", "error");
        return;
      }

      titleInput.value = "";
      resizeTextarea(titleInput);
      titleInput.focus();
      loadKeeps();
    });

    codeForm.addEventListener("submit", (event) => {
      event.preventDefault();
      setActiveCode(codeInput.value, { pushUrl: Boolean(activeCode) });
    });

    changeCodeButton.addEventListener("click", showCodeGate);
    copyLinkButton.addEventListener("click", () => copyText(window.location.href, copyLinkButton, "Đã copy"));
    titleInput.addEventListener("input", () => resizeTextarea(titleInput));

    window.addEventListener("popstate", () => {
      const code = getUrlCode();
      if (code && code !== activeCode) setActiveCode(code, { writeUrl: false });
    });

    async function copyText(text, button, successText) {
      const originalText = button.textContent;

      try {
        await navigator.clipboard.writeText(text);
        button.textContent = successText;
      } catch (error) {
        const helper = document.createElement("textarea");
        helper.value = text;
        helper.setAttribute("readonly", "");
        helper.style.position = "fixed";
        helper.style.opacity = "0";
        document.body.append(helper);
        helper.select();
        document.execCommand("copy");
        helper.remove();
        button.textContent = successText;
      }

      setTimeout(() => {
        button.textContent = originalText;
      }, 1400);
    }

    async function deleteKeep(id) {
      await fetch(notesUrl(`/${id}`), {
        method: "DELETE"
      });

      loadKeeps();
    }

    function init() {
      resizeTextarea(titleInput);

      const urlCode = getUrlCode();
      const savedCode = normalizeCode(getCookie(CODE_COOKIE));

      if (urlCode) {
        setActiveCode(urlCode, { writeUrl: false });
        return;
      }

      if (savedCode) {
        setActiveCode(savedCode);
        return;
      }

      showCodeGate();
    }

    init();
  </script>
</body>
</html>
