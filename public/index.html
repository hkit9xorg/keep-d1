<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Keep D1</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="code-gate" id="codeGate" hidden>
    <form class="code-card" id="codeForm">
      <h2>Nhập code</h2>
      <input class="code-input" id="codeInput" autocomplete="off" spellcheck="false" placeholder="vd: ca-nhan" />
      <div class="code-card-actions">
        <button class="primary-button" type="submit">Mở ghi chú</button>
      </div>
    </form>
  </div>

  <main class="app" id="app" hidden>
    <header>
      <div>
        <h1 class="subtitle">Ghi lại nhanh mọi ý tưởng cần nhớ.</h1>
      </div>
      <div class="header-tools">
        <div class="code-pill" title="Code hiện tại">Code: <strong id="currentCode"></strong></div>
        <button class="ghost-button" id="changeCodeButton" type="button">Đổi code</button>
        <button class="ghost-button" id="copyLinkButton" type="button">Copy link</button>
        <div class="count" id="count">0 ghi chú</div>
      </div>
    </header>

    <form class="composer" id="form">
      <textarea id="title" rows="1" placeholder="Nhập nội dung ghi chú..."></textarea>
      <div class="composer-actions">
        <button class="primary-button" type="submit">Lưu ghi chú</button>
      </div>
    </form>

    <section class="notes" id="list" aria-live="polite"></section>
  </main>

  <dialog class="note-modal" id="noteModal" aria-labelledby="noteModalTitle">
    <div class="note-modal-panel">
      <div class="note-modal-header">
        <div>
          <h2 id="noteModalTitle">Ghi chú đầy đủ</h2>
          <p class="note-modal-date" id="noteModalDate"></p>
        </div>
        <button class="ghost-button" id="closeNoteModalButton" type="button">Đóng</button>
      </div>
      <p class="note-modal-text" id="noteModalText"></p>
      <div class="note-modal-actions">
        <button class="ghost-button" id="copyModalNoteButton" type="button">Copy</button>
        <button class="primary-button" id="closeNoteModalFooterButton" type="button">Đóng</button>
      </div>
    </div>
  </dialog>

  <script src="app.js">
  </script>
</body>
</html>
